name: Nirvana Autonomous Core Evolution

on:
  schedule:
    # Runs every 14 days at midnight (UTC)
    - cron: '0 0 */14 * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Needed to push updates to Nirvana.md
  issues: write   # Needed to close issues after they are processed

jobs:
  evolve-core:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🧠 Run Nirvana Brain Synthesis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Required: Add this in Settings > Secrets
        run: node scripts/synthesize.js

      - name: 💾 Commit & Push Evolutions
        run: |
          git config --global user.name 'Nirvana-Hive-Mind[bot]'
          git config --global user.email 'nirvana-bot@users.noreply.github.com'
          git add Nirvana.md
          
          # Only commit if the AI actually changed the file
          git diff --quiet && git diff --staged --quiet || git commit -m "🧠 Nirvana Core Evolution: Merged Hive Mind Data"
          
          git push
